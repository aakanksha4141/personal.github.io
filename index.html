<!DOCTYPE html>
<html>
<head>
  <title>Smart Study System</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 12px;
      margin: 10px auto;
      width: 300px;
      border-radius: 10px;
      text-align: left;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 15px;
    }

    .progress-bar {
      width: 80%;
      height: 20px;
      background: #334155;
      margin: 20px auto;
      border-radius: 10px;
    }

    .fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
    }

    .message {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>🚀 Smart Study System</h1>

<h2 id="day"></h2>

<div id="plan"></div>

<button onclick="finishDay()">Finish Day</button>

<div class="progress-bar">
  <div class="fill" id="bar"></div>
</div>

<h3>Progress: <span id="percent">0%</span></h3>
<h3>🔥 Streak: <span id="streak">0</span></h3>

<div class="message" id="msg"></div>

<script>
let totalDays = 100;

let data = JSON.parse(localStorage.getItem("smart")) || {
  day: 1,
  progress: 0,
  streak: 0
};

// Encouragement messages
let messages = [
  "Good job. Keep going.",
  "Consistency beats talent.",
  "You are building your future.",
  "Small steps, big results.",
  "Stay disciplined."
];

// Knowledge bank
let knowledge = [
  "Word: Resilient = able to recover quickly from difficulties.",
  "Java: JVM executes compiled bytecode.",
  "Word: Consistency = doing something regularly.",
  "Java: Array stores multiple values in one variable.",
  "Tip: Practice improves retention."
];

// Plans
function getPlan(day) {
  if (day % 7 === 0) {
    return [
      "🔁 Revise Java topics",
      "🔁 Re-solve problems",
      "🔁 Review IELTS mistakes"
    ];
  }

  let javaTopics = ["Basics", "Loops", "Arrays", "Strings"];
  let topic = javaTopics[day % javaTopics.length];

  return [
    "📘 IELTS: 1 Reading + 1 Writing",
    "💻 Java: " + topic,
    "💻 Coding: 2 problems",
    "📖 Read 10 pages"
  ];
}

// Render plan
function render() {
  document.getElementById("day").innerText =
    "Day " + data.day + " / " + totalDays;

  let plan = getPlan(data.day);
  let html = "";

  plan.forEach((task, i) => {
    html += `<div class="box">
      <label><input type="checkbox" id="t${i}"> ${task}</label>
    </div>`;
  });

  document.getElementById("plan").innerHTML = html;

  document.getElementById("percent").innerText =
    Math.floor(data.progress) + "%";

  document.getElementById("bar").style.width =
    data.progress + "%";

  document.getElementById("streak").innerText = data.streak;
}

// Finish day
function finishDay() {
  let checkboxes = document.querySelectorAll("input[type=checkbox]");
  let done = 0;

  checkboxes.forEach(cb => {
    if (cb.checked) done++;
  });

  let total = checkboxes.length;

  if (done === 0) {
    alert("Do at least one task.");
    return;
  }

  let gain = (done / total) * (100 / totalDays);
  data.progress += gain;
  data.day++;

  if (done >= total / 2) {
    data.streak++;
  } else {
    data.streak = 0;
  }

  localStorage.setItem("smart", JSON.stringify(data));

  let msg = messages[Math.floor(Math.random() * messages.length)];
  let know = knowledge[Math.floor(Math.random() * knowledge.length)];

  document.getElementById("msg").innerHTML =
    msg + "<br><br>🧠 " + know;

  setTimeout(() => location.reload(), 2000);
}

render();
</script>

</body>
</html>
