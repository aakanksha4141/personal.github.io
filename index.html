<!DOCTYPE html>
<html>
<head>
  <title>100 Day Success Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .box {
      background: #1e293b;
      padding: 12px;
      margin: 10px auto;
      width: 280px;
      border-radius: 10px;
      text-align: left;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 15px;
    }

    .progress-container {
      width: 80%;
      height: 20px;
      background: #334155;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #22c55e;
      width: 0%;
    }

    .stats {
      margin-top: 15px;
    }
  </style>
</head>
<body>

<h1>🚀 100 Day Success Tracker</h1>

<h2 id="day">Day 1 / 100</h2>

<div class="box">
  <label><input type="checkbox" id="ielts"> IELTS (1 task)</label>
</div>

<div class="box">
  <label><input type="checkbox" id="java"> Java (1 concept)</label>
</div>

<div class="box">
  <label><input type="checkbox" id="codechef"> CodeChef (2 problems)</label>
</div>

<div class="box">
  <label><input type="checkbox" id="reading"> Read (10 pages)</label>
</div>

<button onclick="completeDay()">Complete Today</button>

<div class="progress-container">
  <div class="progress-bar" id="bar"></div>
</div>

<h3>Progress: <span id="percent">0%</span></h3>

<div class="stats">
  🔥 Streak: <span id="streak">0</span> days<br>
  🏆 Best: <span id="best">0</span> days
</div>

<script>
let totalDays = 100;

let data = JSON.parse(localStorage.getItem("tracker")) || {
  day: 1,
  progress: 0,
  streak: 0,
  best: 0
};

function updateUI() {
  document.getElementById("day").innerText =
    "Day " + data.day + " / " + totalDays;

  document.getElementById("percent").innerText =
    Math.floor(data.progress) + "%";

  document.getElementById("bar").style.width =
    data.progress + "%";

  document.getElementById("streak").innerText = data.streak;
  document.getElementById("best").innerText = data.best;
}

function completeDay() {
  let tasks = [
    document.getElementById("ielts").checked,
    document.getElementById("java").checked,
    document.getElementById("codechef").checked,
    document.getElementById("reading").checked
  ];

  let done = tasks.filter(t => t).length;

  if (done === 0) {
    alert("Do at least something ❗");
    return;
  }

  let progressGain = (done / tasks.length) * (100 / totalDays);

  data.progress += progressGain;
  data.day++;

  // streak logic
  if (done >= 2) {
    data.streak++;
    if (data.streak > data.best) {
      data.best = data.streak;
    }
  } else {
    data.streak = 0;
  }

  if (data.progress > 100) data.progress = 100;

  localStorage.setItem("tracker", JSON.stringify(data));

  alert("Progress updated ✅");
  location.reload();
}

updateUI();
</script>

</body>
</html>
