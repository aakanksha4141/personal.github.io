<!DOCTYPE html>
<html>
<head>
<title>Ultimate Study System</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white;text-align:center}
.box{background:#1e293b;padding:12px;margin:10px auto;width:400px;border-radius:10px;text-align:left}
button{padding:10px 20px;margin:10px;background:#22c55e;border:none;color:white;border-radius:6px}
.progress{width:80%;height:20px;background:#334155;margin:20px auto;border-radius:10px}
.fill{height:100%;background:#22c55e;width:0%}
</style>
</head>

<body>

<h1>🚀 Daily Study System</h1>
<h2 id="day"></h2>

<div id="content"></div>

<button onclick="finishDay()">Finish Day</button>

<div class="progress"><div class="fill" id="bar"></div></div>
<h3 id="percent"></h3>

<script>

let totalDays = 30;
let data = JSON.parse(localStorage.getItem("study")) || { day: 1, done: 0 };

let syllabus = [];

// ===== NEW REAL PLAN =====
for (let i = 1; i <= 30; i++) {

syllabus.push({

entrance: {
title: "Entrance Prep Day " + i,
theory: "Focus on core CS subjects + MCQs.",
steps: ["Revise concept", "Solve MCQs", "Analyze mistakes"],
example: "Array question → check index logic",
task: "Solve 50 MCQs (DS/DBMS/Aptitude)"
},

project: {
title: "Project Work Day " + i,
theory: "Build Traffic Sign Recognition step by step.",
steps: ["Learn concept", "Run code", "Test output"],
example: "Input image → model predicts sign",
task: i<=10 ? "Learn Python basics" :
      i<=20 ? "Work on TensorFlow model" :
              "Test + finalize project"
},

java: {
title: "Java Learning Day " + i,
theory: "Build coding from zero to basics.",
steps: ["Understand", "Write code", "Practice"],
example: i<=10 ? "int a=10;" :
        i<=20 ? "Arrays example" :
                "OOP class example",
task: i<=10 ? "Learn variables, loops" :
      i<=20 ? "Practice arrays & functions" :
              "Learn OOP basics"
},

english: {
title: "English Practice Day " + i,
theory: "Improve speaking + listening.",
steps: ["Listen", "Speak", "Learn words"],
example: "Speak about your day",
task: "Speak 10 mins + watch 1 video"
},

});

// END LOOP
}

// ===== RENDER =====
function render(){

let d = data.day - 1;
if(d >= 30) d = 29;

let day = syllabus[d];

document.getElementById("day").innerText = "Day " + data.day + "/30";

function box(title,obj){
return `
<div class="box">
<b>${title}: ${obj.title}</b><br><br>
<b>What:</b> ${obj.theory}<br><br>
<b>Steps:</b>
<ul>${obj.steps.map(s=>"<li>"+s+"</li>").join("")}</ul>
<b>Example:</b> ${obj.example}<br><br>
<b>Task:</b> ${obj.task}<br>
<input type="checkbox"> Done
</div>`;
}

document.getElementById("content").innerHTML =
box("🎯 Entrance",day.entrance)+
box("🤖 Project",day.project)+
box("💻 Java",day.java)+
box("🗣 English",day.english);

// progress
let percent = Math.floor((data.done / totalDays) * 100);
document.getElementById("percent").innerText = "Progress: " + percent + "%";
document.getElementById("bar").style.width = percent + "%";

}

// ===== FINISH DAY =====
function finishDay(){
data.done++;
data.day++;
localStorage.setItem("study", JSON.stringify(data));
location.reload();
}

render();

</script>
</body>
</html>
