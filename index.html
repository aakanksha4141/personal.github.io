<!DOCTYPE html>
<html>
<head>
<title>Ultimate Study System</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white;text-align:center}
.box{background:#1e293b;padding:12px;margin:10px auto;width:400px;border-radius:10px;text-align:left}
button{padding:10px 20px;margin:10px;background:#22c55e;border:none;color:white;border-radius:6px}
.progress{width:80%;height:20px;background:#334155;margin:20px auto;border-radius:10px}
.fill{height:100%;background:#22c55e;width:0%}
</style>
</head>

<body>

<h1>🚀 Daily Study System</h1>
<h2 id="day"></h2>

<div id="content"></div>

<button onclick="finishDay()">Finish Day</button>

<div class="progress"><div class="fill" id="bar"></div></div>
<h3 id="percent"></h3>

<script>

let totalDays=30;
let data=JSON.parse(localStorage.getItem("study"))||{day:1,done:0};

// ===== FULL 30 DAY CONTENT =====
let syllabus=[];

for(let i=1;i<=30;i++){
syllabus.push({

reading:{
title:"Reading Skill "+i,
theory:"Understand passage structure and answer questions accurately.",
steps:["Read title","Identify keywords","Match answers","Avoid traps"],
example:"Question asks year → scan numbers in passage",
task:"Solve 1 passage and check accuracy"
},

writing:{
title:"Writing Skill "+i,
theory:"Develop structured answers with clarity.",
steps:["Write intro","Give overview","Add details","Use linking words"],
example:"Overall, trend increased steadily.",
task:"Write 5-8 sentences"
},

listening:{
title:"Listening Skill "+i,
theory:"Catch key information from audio.",
steps:["Read questions first","Underline keywords","Listen carefully"],
example:"Listen for numbers, names, places",
task:"Practice 1 section"
},

speaking:{
title:"Speaking Skill "+i,
theory:"Speak clearly with ideas and examples.",
steps:["Start confidently","Expand answer","Give example"],
example:"I enjoy reading because it improves knowledge.",
task:"Speak for 1 minute"
},

java:{
title:"Java Topic "+i,
theory:"Core programming concept for problem solving.",
steps:["Understand concept","Write syntax","Practice example"],
example:"int a=10;",
task:"Write and run code"
},

question:"What is concept "+i+"?",
vocab:"Word "+i+" = Meaning"

});
}

// RENDER
function render(){

let d=data.day-1;
if(d>=30) d=29;

let day=syllabus[d];

document.getElementById("day").innerText="Day "+data.day+"/30";

function box(title,obj){
return `
<div class="box">
<b>${title}: ${obj.title}</b><br><br>
<b>What:</b> ${obj.theory}<br><br>
<b>Steps:</b>
<ul>${obj.steps.map(s=>"<li>"+s+"</li>").join("")}</ul>
<b>Example:</b> ${obj.example}<br><br>
<b>Task:</b> ${obj.task}<br>
<input type="checkbox"> Done
</div>`;
}

document.getElementById("content").innerHTML =
box("📘 Reading",day.reading)+
box("✍ Writing",day.writing)+
box("🎧 Listening",day.listening)+
box("🗣 Speaking",day.speaking)+
box("💻 Java",day.java)+
`<div class="box"><b>🧠 Question:</b> ${day.question}</div>
<div class="box"><b>📚 Vocabulary:</b> ${day.vocab}</div>`;

// progress
let percent=Math.floor((data.done/totalDays)*100);
document.getElementById("percent").innerText="Progress: "+percent+"%";
document.getElementById("bar").style.width=percent+"%";

}

// FINISH
function finishDay(){
data.done++;
data.day++;
localStorage.setItem("study",JSON.stringify(data));
location.reload();
}

render();

</script>

</body>
</html>
